<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <!-- Step 1: link bootstrap file-->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-3">
        <h2>Tables</h2>
        <!-- Step 2: table class -->
        <table class="table table-dark table-striped table-bordered">
            <!-- table , table-dark, table table-striped, table table-bordered -->
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Alice</td>
                <td>22</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Bob</td>
                <td>23</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Carl</td>
                <td>24</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Dean</td>
                <td>22</td>
            </tr>
        </table>
    </div>
</body>

</html>
