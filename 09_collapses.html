<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapses</title>
    <!-- Step 1: link bootstrap css file-->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- Step 2: link bootstrap js file -->
    <script src="js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container mt-3">
        <h2>Collapses</h2>
        <!-- Step 3: collapse class -->
        <p>
            <a class="btn btn-primary" data-bs-toggle="collapse" href="#item">
                Click Me
            </a>
        </p>
        <div class="collapse" id="item">
            <div class="card card-body">
                <h5 class="card-title"></h5>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Enim nulla repellendus ipsam recusandae esse
                    quisquam facere mollitia est, impedit illum.</p>
            </div>
        </div>
    </div>
</body>

</html>
