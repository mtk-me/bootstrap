<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navs & Tabs</title>
    <!-- Step 1: link bootstrap css file-->
    <link rel="stylesheet" href="css/bootstrap.min.css">

    <!-- css -->
    <style>
        body {
            /* just for bottom space */
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <h2>Navs & Tabs</h2>
        <!-- Step 2: nav class -->
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a href="#" class="nav-link active">Users</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Supervisors</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Admins</a>
            </li>
        </ul>

        <br><br>

        <h2>Nav Fill</h2>
        <ul class="nav nav-tabs nav-fill">
            <li class="nav-item">
                <a href="#" class="nav-link active">Users</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Supervisors</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Admins</a>
            </li>
        </ul>

        <br><br>

        <h2>Nav Pills</h2>
        <ul class="nav nav-pills">
            <li class="nav-item">
                <a href="#" class="nav-link active">Users</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Supervisors</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Admins</a>
            </li>
        </ul>

        <br><br>

        <h2>Nav Badge</h2>
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    Users
                    <span class="badge bg-primary rounded-pill">20</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Supervisors</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">Admins</a>
            </li>
        </ul>

        <br><br>

        <h2>Navbar</h2>
        <nav class="navbar navbar-expand-sm navbar-dark bg-primary">
            <div class="container-fluid">
                <a href="#" class="navbar-brand">Bootstrap</a>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">About</a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</body>

</html>
