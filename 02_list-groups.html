<head>

    <title>List Groups</title>
    <!-- Step 1: link bootstrap file-->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-3">
        <h2>List Groups</h2>

            <li class="list-group-item">Item Four</li>
            <li class="list-group-item list-group-item-secondary">Item Five</li>
        </ul>
    </div>

</html>
